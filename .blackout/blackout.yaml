version: "1.0"

org: acme-corp
timezone: "America/New_York"

defaults:
  verdict_on_match: block
  allow_override: false
  override_approvers: []
  notify:
    slack: []
    pr_comment: true

windows:
  - id: q1-freeze
    name: "Q1 Quarter-End Change Freeze"
    industry_template: banking/quarter-end
    recurrence:
      type: range
      start: "2026-03-28T00:00:00"
      end: "2026-03-31T23:59:59"
    verdict: block
    reason: "SOX-mandated change freeze. No deployments permitted during quarter-end close."
    allow_override: true
    override_approvers:
      - github: jsmith
      - github: ltorvalds
    notify:
      slack:
        - channel: "#deployments"
        - channel: "#eng-leads"
      pr_comment: true

  - id: icu-shift-change
    name: "ICU Shift Change Window"
    industry_template: healthcare/shift-change
    recurrence:
      type: cron
      expressions:
        - "0 6 * * *"
        - "0 14 * * *"
        - "0 22 * * *"
      duration_minutes: 60
    verdict: block
    reason: "Hospital policy prohibits deployments during nursing shift transitions."
    allow_override: false
    notify:
      slack:
        - channel: "#platform-eng"
      pr_comment: true

  - id: black-friday
    name: "Black Friday Peak Traffic Window"
    industry_template: retail/peak-traffic
    recurrence:
      type: range
      start: "2026-11-27T00:00:00"
      end: "2026-11-30T23:59:59"
    verdict: block
    reason: "Deployment freeze during peak retail window. Coordinate with VP Eng for exceptions."
    allow_override: true
    override_approvers:
      - github: cto-handle
    notify:
      slack:
        - channel: "#incidents"
      pr_comment: true

  - id: weekend-warning
    name: "Weekend Deployment Warning"
    recurrence:
      type: cron
      expressions:
        - "0 0 * * 6"
      duration_minutes: 2880
    verdict: warn
    reason: "Weekend deployments require on-call engineer confirmation. Proceed with caution."
    allow_override: true
    override_approvers: []
    notify:
      slack:
        - channel: "#on-call"
      pr_comment: true

  - id: pagerduty-sync
    name: "PagerDuty Maintenance Windows"
    source:
      type: pagerduty
      service_ids:
        - "PXXXXXX"
        - "PYYYYYY"
      auth_secret: PAGERDUTY_API_KEY
    verdict: block
    reason: "Active PagerDuty maintenance window detected."
    allow_override: false
    notify:
      slack:
        - channel: "#deployments"
      pr_comment: true

environments:
  production:
    applies_to: ["main", "release/*"]
    windows: ["q1-freeze", "icu-shift-change", "black-friday", "weekend-warning", "pagerduty-sync"]
  staging:
    applies_to: ["staging", "develop"]
    windows: ["weekend-warning"]
  development:
    applies_to: ["feature/*", "fix/*"]
    windows: []
